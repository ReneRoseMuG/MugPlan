<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56">
  <!-- MuG Plan App Icon - Variante B2 (Kalender + Uhr, Punktraster) -->
  <!-- Hintergrund -->
  <rect width="56" height="56" rx="13" fill="#D97706"/>
  <!-- Kalender: Körper -->
  <rect x="10" y="14" width="26" height="24" rx="4" fill="#ffffff" fill-opacity="0.18"/>
  <!-- Kalender: Kopfzeile -->
  <rect x="10" y="14" width="26" height="8" rx="4" fill="#ffffff" fill-opacity="0.40"/>
  <rect x="10" y="18" width="26" height="4" fill="#ffffff" fill-opacity="0.15"/>
  <!-- Kalender: Haken links + rechts -->
  <line x1="15" y1="11" x2="15" y2="17" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="30" y1="11" x2="30" y2="17" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Kalender: Punktraster (Tage) -->
  <circle cx="16" cy="28" r="1.5" fill="#ffffff" fill-opacity="0.90"/>
  <circle cx="23" cy="28" r="1.5" fill="#ffffff" fill-opacity="0.90"/>
  <circle cx="16" cy="33" r="1.5" fill="#ffffff" fill-opacity="0.60"/>
  <circle cx="23" cy="33" r="1.5" fill="#ffffff" fill-opacity="0.60"/>
  <!-- Uhr: Kreis -->
  <circle cx="39" cy="34" r="9" fill="#ffffff" fill-opacity="0.22" stroke="#ffffff" stroke-width="1.8"/>
  <!-- Uhr: Zeiger -->
  <line x1="39" y1="28.5" x2="39" y2="34" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="39" y1="34"   x2="43" y2="36.5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
</svg>
